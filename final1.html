<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDENT INFORMATION SITE</title>

<style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }
        h1 {
            margin: 20px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #333;
            padding: 15px;
            vertical-align: top;
        }
        th {
            background-color: #d6c2a8;
        }
        td {
            background-color: #ffffff;
        }
        .day {
            font-weight: bold;
            background-color: #e6d3b3;
        }
 
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        max-width: 1100px;
        margin: auto;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
    }
    th {
        background: #d9c2a7;
    }
    .day {
        background: #e8d3b5;
        font-weight: bold;
        width: 120px;
    }
    .time {
        font-size: 12px;
        color: #555;
    }
 
    body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

header {
    width: 95%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #2c3e50;
    padding: 10px 30px;
    color: white;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #2c3e50;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

nav a:hover {
    color: #1abc9c;
}

.welcome {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 50px;
}

.welcome-text h1 {
    font-size: 40px;
}

.profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #2c3e50;
}

.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
}

</style>
</head>    

<body>
    <header>
        <div class="logo">
            <img src="pic6.1.jpg" alt="Logo">
            <h2>Student Information Site</h2>
        </div>

        <nav>
            <a href="final1.html">Home</a>
            <a href="final2.html">Schedule</a>
            <a href="final3.html">Digital ID</a>
            <a href="final4.html">Account</a>
        </nav>
    </header>

    <section class="welcome">
        <div class="welcome-text">
            <h1>Welcome, Student 👋</h1>
            <p>Access your academic information schedule,digital id and manage your account.</p>
        </div>

        <div class="profile">
            <img src="pic6.2.jpg" alt="Profile">
        </div>
    </section>

    <section class="dashboard">
        <div class="card">
            <h3>Account</h3>
            <p>View your personal details</p>
        </div>

        <div class="card">
            <h3>Schedule</h3>
            <p>Check your classes</p>
        </div>

        <div class="card">
            <h3>Digital ID</h3>
            <p>Open your student digital ID</p>
        </div>
    </section>

</body>
</html>
